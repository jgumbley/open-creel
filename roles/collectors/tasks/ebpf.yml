---
- name: Ensure eBPF bronze logs exist without truncation
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  loop:
    - /var/lib/open-creel/data/bronze/ebpf/exec.log
    - /var/lib/open-creel/data/bronze/ebpf/fileaccess.log
    - /var/lib/open-creel/data/bronze/ebpf/connect.log

- name: Remove non-JSON lines from eBPF bronze logs
  ansible.builtin.shell: |
    set -euo pipefail
    tmp_file="$(mktemp)"
    awk '/^[[:space:]]*\{/{print}' "{{ item }}" > "${tmp_file}"
    install -o root -g root -m 0644 "${tmp_file}" "{{ item }}"
    rm -f "${tmp_file}"
  args:
    executable: /bin/bash
  loop:
    - /var/lib/open-creel/data/bronze/ebpf/exec.log
    - /var/lib/open-creel/data/bronze/ebpf/fileaccess.log
    - /var/lib/open-creel/data/bronze/ebpf/connect.log

- name: Write eBPF exec trace script
  ansible.builtin.copy:
    dest: /etc/open-creel/ebpf/exec.bt
    owner: root
    group: root
    mode: "0644"
    content: |
      tracepoint:syscalls:sys_enter_execve
      {
        $ppid = curtask->real_parent->tgid;
        $seed = str(args->filename) == "/usr/bin/openclaw" ||
                str(args->filename) == "/usr/local/bin/openclaw" ||
                str(args->filename) == "/opt/openclaw/bin/openclaw";
        if ($seed || @tracked[$ppid] || @tracked[pid]) {
          @tracked[pid] = 1;
          printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"binary\":\"%s\",\"argv\":[\"%s\",\"%s\",\"%s\",\"%s\",\"%s\",\"%s\",\"%s\",\"%s\"],\"cwd\":null}\n",
                 nsecs, pid, $ppid, uid, comm, str(args->filename),
                 str(args->argv[0]), str(args->argv[1]), str(args->argv[2]), str(args->argv[3]),
                 str(args->argv[4]), str(args->argv[5]), str(args->argv[6]), str(args->argv[7]));
        }
      }

      tracepoint:syscalls:sys_enter_execveat
      {
        $ppid = curtask->real_parent->tgid;
        $seed = str(args->filename) == "/usr/bin/openclaw" ||
                str(args->filename) == "/usr/local/bin/openclaw" ||
                str(args->filename) == "/opt/openclaw/bin/openclaw";
        if ($seed || @tracked[$ppid] || @tracked[pid]) {
          @tracked[pid] = 1;
          printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"binary\":\"%s\",\"argv\":[\"%s\",\"%s\",\"%s\",\"%s\",\"%s\",\"%s\",\"%s\",\"%s\"],\"cwd\":null}\n",
                 nsecs, pid, $ppid, uid, comm, str(args->filename),
                 str(args->argv[0]), str(args->argv[1]), str(args->argv[2]), str(args->argv[3]),
                 str(args->argv[4]), str(args->argv[5]), str(args->argv[6]), str(args->argv[7]));
        }
      }

      tracepoint:sched:sched_process_exit
      /@tracked[pid]/
      {
        delete(@tracked[pid]);
      }

      END
      {
        clear(@tracked);
      }
  register: ebpf_exec_script_write

- name: Write eBPF file access trace script
  ansible.builtin.copy:
    dest: /etc/open-creel/ebpf/fileaccess.bt
    owner: root
    group: root
    mode: "0644"
    content: |
      tracepoint:sched:sched_process_exec
      {
        $ppid = curtask->real_parent->tgid;
        $seed = comm == "openclaw" ||
                str(args->filename) == "/usr/bin/openclaw" ||
                str(args->filename) == "/usr/local/bin/openclaw" ||
                str(args->filename) == "/opt/openclaw/bin/openclaw";
        if ($seed || @tracked[$ppid]) {
          @tracked[pid] = 1;
        }
      }

      tracepoint:sched:sched_process_exit
      /@tracked[pid]/
      {
        delete(@tracked[pid]);
      }

      END
      {
        clear(@tracked);
      }

      tracepoint:syscalls:sys_enter_openat
      /@tracked[pid]/
      {
        $ppid = curtask->real_parent->tgid;
        $accmode = args->flags & 3;
        $read = $accmode == 0 || $accmode == 2;
        $write = $accmode == 1 || $accmode == 2;
        $create = (args->flags & 64) != 0;
        $truncate = (args->flags & 512) != 0;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"path\":\"%s\",\"flags\":%d,\"read\":%s,\"write\":%s,\"create\":%s,\"truncate\":%s}\n",
               nsecs, pid, $ppid, uid, comm, str(args->filename), args->flags,
               $read ? "true" : "false",
               $write ? "true" : "false",
               $create ? "true" : "false",
               $truncate ? "true" : "false");
      }

      tracepoint:syscalls:sys_enter_unlink
      /@tracked[pid]/
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"delete\",\"path\":\"%s\"}\n",
               nsecs, pid, $ppid, uid, comm, str(args->pathname));
      }

      tracepoint:syscalls:sys_enter_unlinkat
      /@tracked[pid]/
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"delete\",\"path\":\"%s\"}\n",
               nsecs, pid, $ppid, uid, comm, str(args->pathname));
      }

      tracepoint:syscalls:sys_enter_rename
      /@tracked[pid]/
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"rename\",\"path\":\"%s\",\"new_path\":\"%s\"}\n",
               nsecs, pid, $ppid, uid, comm, str(args->oldname), str(args->newname));
      }

      tracepoint:syscalls:sys_enter_renameat
      /@tracked[pid]/
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"rename\",\"path\":\"%s\",\"new_path\":\"%s\"}\n",
               nsecs, pid, $ppid, uid, comm, str(args->oldname), str(args->newname));
      }

      tracepoint:syscalls:sys_enter_renameat2
      /@tracked[pid]/
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"rename\",\"path\":\"%s\",\"new_path\":\"%s\"}\n",
               nsecs, pid, $ppid, uid, comm, str(args->oldname), str(args->newname));
      }
  register: ebpf_file_script_write

- name: Write eBPF connect trace script
  ansible.builtin.copy:
    dest: /etc/open-creel/ebpf/connect.bt
    owner: root
    group: root
    mode: "0644"
    content: |
      tracepoint:syscalls:sys_enter_connect
      /args->addrlen >= 16/
      {
        $sa = (struct sockaddr *)uptr(args->uservaddr);
        if ($sa->sa_family == 2) {
          $ppid = curtask->real_parent->tgid;
          $in = (struct sockaddr_in *)uptr(args->uservaddr);
          $dst_port = (($in->sin_port & 0xff) << 8) | (($in->sin_port >> 8) & 0xff);
          printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"dst_ip\":\"%s\",\"dst_port\":%d}\n",
                 nsecs, pid, $ppid, uid, comm, ntop($in->sin_addr.s_addr), $dst_port);
        } else if ($sa->sa_family == 10) {
          $ppid = curtask->real_parent->tgid;
          $in6 = (struct sockaddr_in6 *)uptr(args->uservaddr);
          $dst_port = (($in6->sin6_port & 0xff) << 8) | (($in6->sin6_port >> 8) & 0xff);
          printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"dst_ip\":\"%s\",\"dst_port\":%d}\n",
                 nsecs, pid, $ppid, uid, comm, ntop(10, $in6->sin6_addr.in6_u.u6_addr8), $dst_port);
        }
      }

      tracepoint:syscalls:sys_enter_bind
      /args->addrlen >= 16/
      {
        $sa = (struct sockaddr *)uptr(args->umyaddr);
        if ($sa->sa_family == 2) {
          $ppid = curtask->real_parent->tgid;
          $in = (struct sockaddr_in *)uptr(args->umyaddr);
          $local_port = (($in->sin_port & 0xff) << 8) | (($in->sin_port >> 8) & 0xff);
          printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"bind\",\"local_ip\":\"%s\",\"local_port\":%d}\n",
                 nsecs, pid, $ppid, uid, comm, ntop($in->sin_addr.s_addr), $local_port);
        } else if ($sa->sa_family == 10) {
          $ppid = curtask->real_parent->tgid;
          $in6 = (struct sockaddr_in6 *)uptr(args->umyaddr);
          $local_port = (($in6->sin6_port & 0xff) << 8) | (($in6->sin6_port >> 8) & 0xff);
          printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"bind\",\"local_ip\":\"%s\",\"local_port\":%d}\n",
                 nsecs, pid, $ppid, uid, comm, ntop(10, $in6->sin6_addr.in6_u.u6_addr8), $local_port);
        }
      }

      tracepoint:syscalls:sys_enter_listen
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"listen\",\"listen_fd\":%d,\"backlog\":%d}\n",
               nsecs, pid, $ppid, uid, comm, args->fd, args->backlog);
      }

      tracepoint:syscalls:sys_enter_accept
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"accept\",\"listen_fd\":%d}\n",
               nsecs, pid, $ppid, uid, comm, args->fd);
      }

      tracepoint:syscalls:sys_enter_accept4
      {
        $ppid = curtask->real_parent->tgid;
        printf("{\"time_ns\":%llu,\"pid\":%d,\"ppid\":%d,\"uid\":%d,\"comm\":\"%s\",\"operation\":\"accept\",\"listen_fd\":%d}\n",
               nsecs, pid, $ppid, uid, comm, args->fd);
      }
  register: ebpf_connect_script_write

- name: Install open-creel eBPF exec systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/open-creel-ebpf-exec.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=open-creel eBPF execve collector
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/bpftrace -q /etc/open-creel/ebpf/exec.bt
      Restart=always
      RestartSec=3
      StandardOutput=append:/var/lib/open-creel/data/bronze/ebpf/exec.log
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
  register: ebpf_exec_unit_write

- name: Install open-creel eBPF file access systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/open-creel-ebpf-fileaccess.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=open-creel eBPF file open/unlink/rename collector
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/bpftrace -q /etc/open-creel/ebpf/fileaccess.bt
      Restart=always
      RestartSec=3
      StandardOutput=append:/var/lib/open-creel/data/bronze/ebpf/fileaccess.log
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
  register: ebpf_file_unit_write

- name: Install open-creel eBPF connect systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/open-creel-ebpf-connect.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=open-creel eBPF connect collector
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/bpftrace -q /etc/open-creel/ebpf/connect.bt
      Restart=always
      RestartSec=3
      StandardOutput=append:/var/lib/open-creel/data/bronze/ebpf/connect.log
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
  register: ebpf_connect_unit_write
